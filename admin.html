<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artemis II — Admin</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a14;
  --bg-card: #12121f;
  --bg-card-hover: #1a1a2e;
  --bg-input: #0e0e1a;
  --accent: #4FC3F7;
  --accent-dim: #2a7da8;
  --text: #e0e0e0;
  --text-dim: #888;
  --text-bright: #fff;
  --border: #2a2a3e;
  --enabled: #4caf50;
  --disabled: #555;
  --warning: #ffb300;
  --danger: #ef5350;
  --radius: 8px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  line-height: 1.5;
  min-height: 100vh;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}
.header h1 {
  font-size: 20px;
  font-weight: 600;
  color: var(--text-bright);
  letter-spacing: 1px;
}
.header h1 span { color: var(--accent); }
.header-right {
  display: flex;
  align-items: center;
  gap: 16px;
}
.back-link { font-size: 14px; }
.unsaved-indicator {
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--warning);
  font-weight: 500;
}
.unsaved-indicator.visible { display: flex; }
.unsaved-dot {
  width: 8px; height: 8px;
  background: var(--warning);
  border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* Stats bar */
.stats-bar {
  padding: 12px 24px;
  font-size: 13px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}
.stats-bar .stat { white-space: nowrap; }
.stats-bar .stat strong { color: var(--text); }

/* Toolbar */
.toolbar {
  padding: 16px 24px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
  border-bottom: 1px solid var(--border);
}

/* Tabs */
.tabs {
  display: flex;
  gap: 0;
  margin-right: 12px;
}
.tab-btn {
  padding: 7px 18px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}
.tab-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.tab-btn:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
.tab-btn.active {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
}

/* Search */
.search-input {
  flex: 1;
  min-width: 200px;
  padding: 8px 14px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-dim); }

/* Filter buttons */
.filters {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.filter-btn {
  padding: 6px 12px;
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn:hover { border-color: var(--accent-dim); color: var(--text); }
.filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* Save button */
.save-btn {
  padding: 8px 20px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-radius: var(--radius);
  background: var(--accent);
  color: #000;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.save-btn:hover { background: #6dd0ff; }

/* Card list */
.card-list {
  padding: 16px 24px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card-list.hidden { display: none; }

/* Photo card */
.card {
  display: flex;
  gap: 14px;
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: background 0.15s;
  align-items: flex-start;
}
.card:hover { background: var(--bg-card-hover); }
.card.disabled-card { opacity: 0.5; }

.card-thumb {
  width: 160px;
  min-width: 160px;
  max-height: 240px;
  object-fit: contain;
  border-radius: 4px;
  background: #1a1a2e;
}

.card-toggle {
  display: flex;
  align-items: center;
  min-width: 50px;
  padding-top: 2px;
}

/* Toggle switch */
.switch {
  position: relative;
  width: 46px;
  height: 26px;
  cursor: pointer;
}
.switch input { display: none; }
.switch .slider {
  position: absolute;
  inset: 0;
  background: var(--disabled);
  border-radius: 26px;
  transition: background 0.2s;
}
.switch .slider::before {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  left: 3px; top: 3px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
}
.switch input:checked + .slider { background: var(--enabled); }
.switch input:checked + .slider::before { transform: translateX(20px); }

/* Card body */
.card-body { flex: 1; min-width: 0; }

.card-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 16px;
  margin-bottom: 6px;
  align-items: center;
}

.card-field {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
}
.card-field label {
  color: var(--text-dim);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.card-field input,
.card-field textarea {
  background: var(--bg-input);
  border: 1px solid transparent;
  border-radius: 4px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  padding: 3px 8px;
  outline: none;
  transition: border-color 0.15s;
}
.card-field input:hover,
.card-field textarea:hover { border-color: var(--border); }
.card-field input:focus,
.card-field textarea:focus { border-color: var(--accent); }
.card-field input.title-input {
  font-weight: 600;
  font-size: 14px;
  color: var(--text-bright);
  width: 350px;
  max-width: 100%;
}
.card-field input.time-input {
  width: 210px;
  color-scheme: dark;
}
.card-field input.short { width: 180px; }
.card-field input.med { width: 260px; }
.card-field textarea.desc-area {
  width: 100%;
  min-height: 60px;
  resize: vertical;
}

.card-checks {
  display: flex;
  gap: 14px;
  font-size: 12px;
  color: var(--text-dim);
  align-items: center;
}
.card-checks label {
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
}
.card-checks input[type="checkbox"] {
  accent-color: var(--accent);
  width: 15px; height: 15px;
}

/* Description toggle */
.desc-toggle {
  font-size: 12px;
  color: var(--accent-dim);
  cursor: pointer;
  background: none;
  border: none;
  padding: 2px 0;
  margin-top: 4px;
}
.desc-toggle:hover { color: var(--accent); }
.delete-btn {
  font-size: 11px;
  color: var(--danger);
  background: none;
  border: 1px solid transparent;
  border-radius: 4px;
  padding: 2px 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.delete-btn:hover { border-color: var(--danger); background: rgba(239,83,80,0.1); }
.desc-section { display: none; margin-top: 6px; }
.desc-section.open { display: block; }

/* Audio card */
.audio-card {
  display: flex;
  gap: 14px;
  padding: 12px 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  align-items: center;
  transition: background 0.15s;
}
.audio-card:hover { background: var(--bg-card-hover); }
.audio-card.disabled-card { opacity: 0.5; }

.audio-file {
  font-size: 12px;
  color: var(--text-dim);
  font-family: 'SF Mono', 'Fira Code', monospace;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 300px;
}

.count-label {
  font-size: 13px;
  color: var(--text-dim);
  padding: 20px 24px;
}

/* -----------------------------------------------------------
   Pending tab (acquisition pipeline inbox)
   ----------------------------------------------------------- */
.pending-pane.hidden { display: none; }

.pending-banner {
  margin: 12px 24px;
  padding: 12px 14px;
  border-radius: var(--radius);
  background: rgba(239, 83, 80, 0.1);
  border: 1px solid var(--danger);
  color: var(--danger);
  font-size: 13px;
  line-height: 1.5;
}
.pending-banner code {
  background: rgba(0,0,0,0.3);
  padding: 2px 6px;
  border-radius: 3px;
  color: #ffb;
  font-size: 12px;
}

.pending-toolbar {
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.pending-sync, .pending-bulk {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.pending-card {
  display: flex;
  gap: 14px;
  padding: 14px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  align-items: flex-start;
  transition: background 0.15s, border-color 0.15s;
  position: relative;
}
.pending-card:hover { background: var(--bg-card-hover); }
.pending-card.quality-red    { border-left: 4px solid var(--danger); }
.pending-card.quality-yellow { border-left: 4px solid var(--warning); }
.pending-card.quality-green  { border-left: 4px solid var(--enabled); }

.pending-thumb {
  width: 200px;
  min-width: 200px;
  height: 140px;
  object-fit: cover;
  border-radius: 4px;
  background: #1a1a2e;
  cursor: pointer;
}

.pending-select {
  display: flex;
  align-items: flex-start;
  padding-top: 6px;
}
.pending-select input[type="checkbox"] {
  width: 18px;
  height: 18px;
  accent-color: var(--accent);
  cursor: pointer;
}

.pending-body {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.pending-title-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.pending-title-row input {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid transparent;
  border-radius: 4px;
  color: var(--text-bright);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  padding: 4px 8px;
  outline: none;
}
.pending-title-row input:focus,
.pending-title-row input:hover { border-color: var(--accent); }

.pending-badges {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.pending-badge {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 8px;
  border-radius: 12px;
  white-space: nowrap;
}
.pending-badge.conf-high   { background: rgba(76,175,80,0.2); color: #81c784; }
.pending-badge.conf-medium { background: rgba(255,179,0,0.2); color: #ffd54f; }
.pending-badge.conf-low    { background: rgba(120,120,120,0.2); color: #aaa; }
.pending-badge.qual-green  { background: rgba(76,175,80,0.15); color: #81c784; }
.pending-badge.qual-yellow { background: rgba(255,179,0,0.15); color: #ffd54f; }
.pending-badge.qual-red    { background: rgba(239,83,80,0.18); color: #ef9a9a; }
.pending-badge.source      { background: rgba(79,195,247,0.15); color: var(--accent); }
.pending-badge.center      { background: rgba(123,104,238,0.18); color: #b0a0ff; }

.pending-meta-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.pending-field {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 12px;
}
.pending-field label {
  color: var(--text-dim);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  white-space: nowrap;
}
.pending-field input,
.pending-field select {
  background: var(--bg-input);
  border: 1px solid transparent;
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 12px;
  padding: 3px 6px;
  outline: none;
}
.pending-field input:hover,
.pending-field input:focus,
.pending-field select:hover,
.pending-field select:focus { border-color: var(--accent); }
.pending-field input.short { width: 150px; }
.pending-field input.med   { width: 200px; }
.pending-field input.time-input { width: 200px; color-scheme: dark; }
.pending-field select { width: 170px; }

.pending-desc {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
  white-space: pre-wrap;
  max-height: 60px;
  overflow: hidden;
  text-overflow: ellipsis;
  cursor: pointer;
}
.pending-desc.expanded { max-height: none; }

.pending-actions {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.pending-actions button {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 4px;
  border: 1px solid transparent;
  background: var(--bg-input);
  color: var(--text);
  cursor: pointer;
  font-weight: 600;
  font-family: inherit;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.pending-actions button.promote  { background: var(--enabled); color: #000; }
.pending-actions button.reject   { background: var(--danger);  color: #fff; }
.pending-actions button.view     { background: transparent;    border-color: var(--border); }
.pending-actions button.promote:hover { background: #66bb6a; }
.pending-actions button.reject:hover  { background: #c62828; }

.pending-empty {
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
  padding: 40px 24px;
  font-style: italic;
}

/* Era-colored highlights for classifier matches inside text. */
.pending-desc mark,
.pending-title-matches mark {
  padding: 0 3px;
  border-radius: 3px;
  font-weight: 600;
  cursor: help;
  background: rgba(255, 235, 100, 0.25);   /* fallback color */
  color: inherit;
}
.pending-desc mark.era-pre-flight-hardware,
.pending-title-matches mark.era-pre-flight-hardware {
  background: rgba(123, 104, 238, 0.32);
  color: #d0c0ff;
}
.pending-desc mark.era-pre-flight-training,
.pending-title-matches mark.era-pre-flight-training {
  background: rgba(76, 175, 80, 0.32);
  color: #c8e6c9;
}
.pending-desc mark.era-mission,
.pending-title-matches mark.era-mission {
  background: rgba(255, 179, 0, 0.32);
  color: #ffe082;
}
.pending-desc mark.era-post-mission,
.pending-title-matches mark.era-post-mission {
  background: rgba(239, 83, 80, 0.32);
  color: #ffcdd2;
}

.pending-title-matches {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}
.pending-title-matches strong {
  color: var(--text-dim);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-right: 4px;
}

.pending-quality-detail {
  font-size: 10px;
  color: var(--warning);
  margin-top: 2px;
  line-height: 1.4;
}
.pending-quality-detail strong { color: var(--text-dim); margin-right: 4px; }
.pending-card.quality-red .pending-quality-detail { color: var(--danger); }

/* Responsive */
@media (max-width: 700px) {
  .header { padding: 12px 14px; }
  .toolbar { padding: 12px 14px; }
  .card-list { padding: 12px 14px; }
  .card { flex-wrap: wrap; }
  .card-field input.title-input { width: 100%; }
  .card-field input.med { width: 100%; }
}
</style>
<script src="photos.js"></script>
</head>
<body>

<div class="header">
  <h1>ARTEMIS <span>II</span> — Admin</h1>
  <div class="header-right">
    <div id="unsaved" class="unsaved-indicator">
      <div class="unsaved-dot"></div>
      Unsaved changes
    </div>
    <a href="index.html" class="back-link">&larr; Back to Timeline</a>
  </div>
</div>

<div class="stats-bar" id="stats-bar"></div>

<div class="toolbar">
  <div class="tabs">
    <button class="tab-btn active" data-tab="photos" onclick="switchTab('photos')">Photos / Videos</button>
    <button class="tab-btn" data-tab="audio" onclick="switchTab('audio')">Audio</button>
    <button class="tab-btn" data-tab="pending" onclick="switchTab('pending')">Pending <span id="pending-tab-count" style="opacity:0.7"></span></button>
  </div>
  <input type="text" class="search-input" id="search" placeholder="Search title, filename, photographer, location...">
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="enabled">Enabled Only</button>
    <button class="filter-btn" data-filter="disabled">Disabled Only</button>
    <button class="filter-btn" data-filter="videos">Videos Only</button>
    <button class="filter-btn" data-filter="crew">Crew Photos Only</button>
  </div>
  <button class="save-btn" style="background:var(--enabled)" onclick="addPhoto()">+ Add Photo</button>
  <button class="save-btn" onclick="exportJSON()">Export photos.js</button>
</div>

<div class="card-list" id="photo-list"></div>
<div class="card-list hidden" id="audio-list"></div>

<!-- Pending tab: review queue from the acquisition pipeline's inbox.json,
     served via the local sidecar (node tools/import/server.js). -->
<div class="pending-pane hidden" id="pending-pane">
  <div class="pending-banner" id="pending-banner" style="display:none"></div>
  <div class="pending-toolbar">
    <div class="pending-sync">
      <input type="text" class="search-input" id="pending-query" placeholder='Optional query — e.g. "Artemis II SLS"' style="min-width:260px">
      <input type="text" class="search-input" id="pending-centers" placeholder="Centers (e.g. KSC,JSC)" style="max-width:180px">
      <input type="number" class="search-input" id="pending-limit" value="20" min="1" max="500" style="max-width:80px" title="Max new candidates this run">
      <button class="save-btn" onclick="runSync()" id="pending-run-btn">Run Sync</button>
    </div>
    <div class="pending-bulk">
      <button class="save-btn" style="background:var(--enabled)" onclick="promoteSelected()" id="pending-promote-btn">Promote Selected (<span id="pending-promote-count">0</span>)</button>
      <button class="save-btn" style="background:var(--danger);color:#fff" onclick="rejectSelected()" id="pending-reject-btn">Reject Selected (<span id="pending-reject-count">0</span>)</button>
      <button class="save-btn" style="background:transparent;color:var(--text);border:1px solid var(--border)" onclick="loadPending()">Refresh</button>
      <a class="back-link" href="tools/import/EDITORIAL.md" target="_blank" rel="noopener" style="margin-left:auto">Editorial principles ↗</a>
    </div>
  </div>
  <div class="card-list" id="pending-list" style="padding-top:0"></div>
</div>

<div class="count-label" id="count-label"></div>

<script>
let data = null;
let hasChanges = false;
let currentTab = 'photos';
let currentFilter = 'all';
let searchQuery = '';

// Heal double-escaped Unicode (e.g. literal "–" → "–") that may have
// been introduced by an upstream ingestion step before reaching photos.js.
function healEscapes(v) {
  if (typeof v === 'string') {
    return v.replace(/\\u([0-9a-fA-F]{4})/g, (_, h) => String.fromCharCode(parseInt(h, 16)));
  }
  if (Array.isArray(v)) return v.map(healEscapes);
  if (v && typeof v === 'object') {
    const out = {};
    for (const k of Object.keys(v)) out[k] = healEscapes(v[k]);
    return out;
  }
  return v;
}

// Load data from photos.js global
data = healEscapes(PHOTO_DATA);
updateStats();
renderPhotos();
renderAudio();

function markChanged() {
  hasChanges = true;
  document.getElementById('unsaved').classList.add('visible');
}

function updateStats() {
  if (!data) return;
  const totalPhotos = data.photos.length;
  const totalAudio = data.audio ? data.audio.length : 0;
  const disabledPhotos = data.photos.filter(p => !p.enabled).length;
  const disabledAudio = data.audio ? data.audio.filter(a => !a.enabled).length : 0;
  const totalDisabled = disabledPhotos + disabledAudio;
  const videos = data.photos.filter(p => p.video).length;
  document.getElementById('stats-bar').innerHTML =
    `<span class="stat"><strong>${totalPhotos}</strong> photos</span>` +
    `<span class="stat"><strong>${videos}</strong> videos</span>` +
    `<span class="stat"><strong>${totalAudio}</strong> audio</span>` +
    `<span class="stat"><strong>${totalDisabled}</strong> disabled</span>`;
}

// Tabs
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('photo-list').classList.toggle('hidden', tab !== 'photos');
  document.getElementById('audio-list').classList.toggle('hidden', tab !== 'audio');
  document.getElementById('pending-pane').classList.toggle('hidden', tab !== 'pending');
  updateCountLabel();
  if (tab === 'pending') loadPending();
}

// Filters
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  currentFilter = btn.dataset.filter;
  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.filter === currentFilter));
  renderPhotos();
  renderAudio();
});

// Search
let searchTimer = null;
document.getElementById('search').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.toLowerCase();
    renderPhotos();
    renderAudio();
  }, 150);
});

function matchesSearch(item) {
  if (!searchQuery) return true;
  const fields = [
    item.title || '', item.file || '', item.photographer || '',
    item.location || '', item.desc || '', item.flickr_desc || ''
  ];
  return fields.some(f => f.toLowerCase().includes(searchQuery));
}

function matchesFilter(item) {
  switch (currentFilter) {
    case 'enabled': return item.enabled === true;
    case 'disabled': return item.enabled === false;
    case 'videos': return item.video === true;
    case 'crew': return item.spacecraft === true && item.video === false;
    default: return true;
  }
}

// Time helpers
function timeToDatetimeLocal(t) {
  if (!t) return '';
  return t.replace(' ', 'T');
}
function datetimeLocalToTime(v) {
  if (!v) return '';
  return v.replace('T', ' ');
}

// Render photos
function renderPhotos() {
  if (!data) return;
  const container = document.getElementById('photo-list');
  const filtered = data.photos.filter(p => matchesSearch(p) && matchesFilter(p));

  const html = filtered.map((photo, _) => {
    const idx = data.photos.indexOf(photo);
    const disabledClass = photo.enabled ? '' : ' disabled-card';
    return `<div class="card${disabledClass}" data-idx="${idx}">
      <img class="card-thumb" src="web/${photo.file}" alt="" loading="lazy"
           onerror="this.style.display='none'">
      <div class="card-toggle">
        <label class="switch">
          <input type="checkbox" ${photo.enabled ? 'checked' : ''}
                 onchange="setPhotoField(${idx},'enabled',this.checked)">
          <span class="slider"></span>
        </label>
      </div>
      <div class="card-body">
        <div class="card-row">
          <div class="card-field">
            <input class="title-input" value="${esc(photo.title || '')}"
                   onchange="setPhotoField(${idx},'title',this.value)"
                   placeholder="Title">
          </div>
          <div class="card-field">
            <label>Time</label>
            <input type="datetime-local" class="time-input"
                   value="${timeToDatetimeLocal(photo.time)}"
                   step="1"
                   onblur="setPhotoField(${idx},'time',datetimeLocalToTime(this.value))"
                   onkeydown="if(event.key==='Enter'){this.blur()}">
          </div>
        </div>
        <div class="card-row">
          <div class="card-field">
            <label>Photographer</label>
            <input class="short" value="${esc(photo.photographer || '')}"
                   onchange="setPhotoField(${idx},'photographer',this.value)">
          </div>
          <div class="card-field">
            <label>Location</label>
            <input class="short" value="${esc(photo.location || '')}"
                   onchange="setPhotoField(${idx},'location',this.value)">
          </div>
        </div>
        <div class="card-row">
          <div class="card-field">
            <label>Camera</label>
            <input class="med" value="${esc(photo.camera || '')}"
                   onchange="setPhotoField(${idx},'camera',this.value)">
          </div>
          <div class="card-field">
            <label>Settings</label>
            <input class="med" value="${esc(photo.settings || '')}"
                   onchange="setPhotoField(${idx},'settings',this.value)">
          </div>
        </div>
        <div class="card-row">
          <div class="card-checks">
            <label><input type="checkbox" ${photo.spacecraft ? 'checked' : ''}
                   onchange="setPhotoField(${idx},'spacecraft',this.checked)"> Crew Photos</label>
            <label><input type="checkbox" ${photo.video ? 'checked' : ''}
                   onchange="setPhotoField(${idx},'video',this.checked)"> Video</label>
            <label><input type="checkbox" ${photo.exterior ? 'checked' : ''}
                   onchange="setPhotoField(${idx},'exterior',this.checked)"> Exterior</label>
            <label><input type="checkbox" ${photo.external ? 'checked' : ''}
                   onchange="setPhotoField(${idx},'external',this.checked)"> External</label>
          </div>
          <div class="card-field">
            <label>File</label>
            <input class="med" style="font-size:11px;font-family:monospace;color:var(--text-dim)" value="${esc(photo.file)}"
                   onchange="setPhotoField(${idx},'file',this.value)"
                   placeholder="filename.jpg">
          </div>
        </div>
        <div style="display:flex;gap:12px;align-items:center;margin-top:4px">
          <button class="desc-toggle" onclick="toggleDesc(this)">Show description</button>
          <button class="delete-btn" onclick="deletePhoto(${idx})">Delete</button>
        </div>
        <div class="desc-section">
          <div class="card-field" style="width:100%">
            <textarea class="desc-area" onchange="setPhotoField(${idx},'flickr_desc',this.value)"
                      placeholder="Description...">${esc(photo.flickr_desc || '')}</textarea>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = html;
  updateCountLabel();
}

function renderAudio() {
  if (!data || !data.audio) return;
  const container = document.getElementById('audio-list');
  const filtered = data.audio.filter(a => matchesSearch(a) && matchesFilterAudio(a));

  const html = filtered.map((audio, _) => {
    const idx = data.audio.indexOf(audio);
    const disabledClass = audio.enabled ? '' : ' disabled-card';
    return `<div class="audio-card${disabledClass}" data-aidx="${idx}">
      <div class="card-toggle">
        <label class="switch">
          <input type="checkbox" ${audio.enabled ? 'checked' : ''}
                 onchange="setAudioField(${idx},'enabled',this.checked)">
          <span class="slider"></span>
        </label>
      </div>
      <div class="card-field">
        <label>Time</label>
        <input type="datetime-local" class="time-input"
               value="${timeToDatetimeLocal(audio.time)}"
               step="1"
               onblur="setAudioField(${idx},'time',datetimeLocalToTime(this.value))"
               onkeydown="if(event.key==='Enter'){this.blur()}">
      </div>
      <span class="audio-file">${esc(audio.file)}</span>
      <div class="card-field" style="flex:1">
        <label>Desc</label>
        <input class="med" value="${esc(audio.desc || '')}"
               onchange="setAudioField(${idx},'desc',this.value)">
      </div>
    </div>`;
  }).join('');

  container.innerHTML = html;
  updateCountLabel();
}

function matchesFilterAudio(item) {
  switch (currentFilter) {
    case 'enabled': return item.enabled === true;
    case 'disabled': return item.enabled === false;
    case 'videos': return false;
    case 'crew': return false;
    default: return true;
  }
}

function updateCountLabel() {
  if (!data) return;
  let count;
  if (currentTab === 'photos') {
    count = document.querySelectorAll('#photo-list .card').length;
    document.getElementById('count-label').textContent = `Showing ${count} of ${data.photos.length} entries`;
  } else {
    count = document.querySelectorAll('#audio-list .audio-card').length;
    const total = data.audio ? data.audio.length : 0;
    document.getElementById('count-label').textContent = `Showing ${count} of ${total} entries`;
  }
}

// Field setters
function setPhotoField(idx, field, value) {
  data.photos[idx][field] = value;
  markChanged();
  updateStats();
  if (field === 'time') {
    // Re-sort by time and re-render so the card moves to its new position
    data.photos.sort((a, b) => (a.time || '').localeCompare(b.time || ''));
    renderPhotos();
  } else if (field === 'enabled') {
    const card = document.querySelector(`.card[data-idx="${idx}"]`);
    if (card) card.classList.toggle('disabled-card', !value);
  }
}

function setAudioField(idx, field, value) {
  data.audio[idx][field] = value;
  markChanged();
  updateStats();
  if (field === 'enabled') {
    const card = document.querySelector(`.audio-card[data-aidx="${idx}"]`);
    if (card) card.classList.toggle('disabled-card', !value);
  }
}

// Delete photo permanently
function deletePhoto(idx) {
  const photo = data.photos[idx];
  const label = photo.title || photo.file || 'this entry';
  if (!confirm('Permanently delete "' + label + '"?')) return;
  data.photos.splice(idx, 1);
  markChanged();
  updateStats();
  renderPhotos();
}

// Add new photo
function addPhoto() {
  const newEntry = {
    file: '',
    title: '',
    time: '',
    photographer: '',
    location: '',
    camera: '',
    settings: '',
    spacecraft: false,
    video: false,
    external: false,
    enabled: true,
    flickr_desc: ''
  };
  data.photos.unshift(newEntry);
  markChanged();
  updateStats();
  renderPhotos();
  // Scroll to top and focus the first title input
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => {
    const firstTitle = document.querySelector('#photo-list .card .title-input');
    if (firstTitle) firstTitle.focus();
  }, 100);
}

// Description toggle
function toggleDesc(btn) {
  const section = btn.nextElementSibling;
  const open = section.classList.toggle('open');
  btn.textContent = open ? 'Hide description' : 'Show description';
}

// Export
function exportJSON() {
  if (!data) return;
  const json = JSON.stringify(data, null, 2);
  // Export as photos.js (what the app actually loads)
  const jsContent = 'const PHOTO_DATA = ' + json + ';\n';
  const blob = new Blob([jsContent], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'photos.js';
  a.click();
  URL.revokeObjectURL(url);
  hasChanges = false;
  document.getElementById('unsaved').classList.remove('visible');
}

// Warn on leave
window.addEventListener('beforeunload', e => {
  if (hasChanges) {
    e.preventDefault();
    e.returnValue = '';
  }
});

// Escape HTML
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML.replace(/"/g, '&quot;');
}

// ============================================================================
// PENDING TAB — talks to the local sidecar (tools/import/server.js) for the
// acquisition pipeline's review queue. Sidecar runs on 127.0.0.1:8001 by
// default; if it isn't running we show a banner explaining how to start it.
// ============================================================================

const SIDECAR_URL = 'http://127.0.0.1:8001';
let pendingCandidates = [];                  // last-loaded inbox snapshot
const pendingSelected = new Set();           // source_ids checked for bulk ops
const pendingEdits = new Map();              // source_id -> { title, time, ... }

async function sidecarFetch(pathname, options) {
  const res = await fetch(SIDECAR_URL + pathname, options);
  if (!res.ok) {
    let body = null;
    try { body = await res.json(); } catch (e) { /* */ }
    const msg = body && body.error
        ? `${res.status} ${body.error}${body.detail ? ' — ' + body.detail : ''}`
        : `${res.status} ${res.statusText}`;
    throw new Error(msg);
  }
  return res.json();
}

function showPendingBanner(html) {
  const b = document.getElementById('pending-banner');
  b.innerHTML = html;
  b.style.display = html ? 'block' : 'none';
}

function clearPendingBanner() {
  showPendingBanner('');
}

async function loadPending() {
  pendingSelected.clear();
  pendingEdits.clear();
  document.getElementById('pending-list').innerHTML =
      '<div class="pending-empty">Loading from sidecar…</div>';
  try {
    const data = await sidecarFetch('/inbox');
    pendingCandidates = data.candidates || [];
    clearPendingBanner();
    renderPending();
  } catch (err) {
    pendingCandidates = [];
    document.getElementById('pending-list').innerHTML = '';
    showPendingBanner(
      'Sidecar offline. Start it with: <code>node tools/import/server.js</code> ' +
      '<br>Then click <strong>Refresh</strong> above. ' +
      '<br><br>Reason: ' + esc(err.message)
    );
    updatePendingCount();
  }
}

function updatePendingCount() {
  document.getElementById('pending-tab-count').textContent =
      pendingCandidates.length ? `(${pendingCandidates.length})` : '';
  document.getElementById('pending-promote-count').textContent = pendingSelected.size;
  document.getElementById('pending-reject-count').textContent  = pendingSelected.size;
}

function renderPending() {
  const list = document.getElementById('pending-list');
  if (pendingCandidates.length === 0) {
    list.innerHTML =
        '<div class="pending-empty">Inbox is empty. Use <strong>Run Sync</strong> above to discover new candidates.</div>';
    updatePendingCount();
    return;
  }
  list.innerHTML = pendingCandidates.map(renderPendingCard).join('');
  updatePendingCount();
}

// Wrap classifier-matched substrings inside one of the candidate's text
// fields with <mark> elements. The returned string is HTML-escaped except
// for the mark wrappers; safe to inject via innerHTML.
//
// Overlapping matches are resolved by "first one wins" — sort by start
// index, skip anything whose start lies inside the previous mark.
function highlightField(text, evidence, sourceField) {
  if (!text) return '';
  const matches = ((evidence && evidence.era_matches) || [])
      .filter(m => m.kind === 'keyword' && m.sourceField === sourceField && typeof m.index === 'number')
      .sort((a, b) => a.index - b.index || (b.excerpt || '').length - (a.excerpt || '').length);

  if (matches.length === 0) return esc(text);

  let out = '';
  let cursor = 0;
  for (const m of matches) {
    const start = m.index;
    const end = start + (m.excerpt || '').length;
    if (start < cursor) continue;                  // overlap with prior mark — skip
    if (start > cursor) out += esc(text.slice(cursor, start));
    const matched = text.slice(start, end);
    const title = `matched pattern: ${m.pattern || m.excerpt}  ·  era: ${m.era}`;
    out += `<mark class="era-${esc(m.era)}" title="${esc(title)}">${esc(matched)}</mark>`;
    cursor = end;
  }
  if (cursor < text.length) out += esc(text.slice(cursor));
  return out;
}

// Collect the unique matched keywords for a given field, with their era.
// Used for the "matched in title:" chip strip.
function uniqueMatchesForField(evidence, sourceField) {
  const seen = new Set();
  const out = [];
  for (const m of ((evidence && evidence.era_matches) || [])) {
    if (m.kind !== 'keyword' || m.sourceField !== sourceField) continue;
    const key = m.era + '|' + m.excerpt.toLowerCase();
    if (seen.has(key)) continue;
    seen.add(key);
    out.push(m);
  }
  return out;
}

function renderPendingCard(c) {
  const id = c.source_id;
  const cls = c.classified || {};
  const conf = cls.confidence || 'low';
  const quality = c.quality || 'red';
  const era = cls.era || 'unknown';
  const isSelected = pendingSelected.has(id);
  const evidence = c.evidence || {};

  // Pull from any edits the user has typed locally so their work survives a
  // re-render (e.g., after another card is rejected and the list refreshes).
  const edits = pendingEdits.get(id) || {};
  const title    = edits.title    !== undefined ? edits.title    : (c.title || '');
  const takenAt  = edits.taken_at !== undefined ? edits.taken_at : (c.taken_at || '');
  const photog   = edits.photographer !== undefined ? edits.photographer : (c.photographer || '');
  const location = edits.location !== undefined ? edits.location : (c.location || '');
  const center   = edits.center   !== undefined ? edits.center   : (c.center || '');
  const eraVal   = edits.era      !== undefined ? edits.era      : era;

  const eraOptions = ['pre-flight-hardware','pre-flight-training','mission','post-mission','unknown']
      .map(e => `<option value="${e}"${e === eraVal ? ' selected' : ''}>${e}</option>`)
      .join('');

  return `<div class="pending-card quality-${esc(quality)}" data-id="${esc(id)}">
    <div class="pending-select">
      <input type="checkbox" ${isSelected ? 'checked' : ''}
             onchange="togglePendingSelect(this, '${esc(id)}')">
    </div>
    <img class="pending-thumb"
         src="${esc(c.thumb_url || c.image_url || '')}"
         alt=""
         onclick="window.open('${esc(c.source_url || c.image_url || '#')}','_blank')"
         onerror="this.style.background='#3a1a1a'; this.alt='thumbnail failed';">
    <div class="pending-body">
      <div class="pending-title-row">
        <input value="${esc(title)}" placeholder="Title"
               onchange="editPending('${esc(id)}','title',this.value)">
        <div class="pending-badges">
          <span class="pending-badge conf-${esc(conf)}" title="${esc(buildConfidenceTooltip(cls, evidence))}">${esc(conf)} conf</span>
          <span class="pending-badge qual-${esc(quality)}" title="${esc(buildQualityTooltip(evidence))}">${esc(quality)}</span>
          ${c.source ? `<span class="pending-badge source">${esc(c.source)}</span>` : ''}
          ${center ? `<span class="pending-badge center" title="${esc((evidence.center_source && evidence.center_source.note) || '')}">${esc(center)}</span>` : ''}
        </div>
      </div>
      ${renderTitleMatches(evidence)}
      ${renderQualityFailures(evidence)}
      <div class="pending-meta-row">
        <div class="pending-field">
          <label>Time</label>
          <input type="datetime-local" class="time-input" step="1"
                 value="${esc(takenAt.replace(' ', 'T'))}"
                 onchange="editPending('${esc(id)}','taken_at',this.value.replace('T',' '))">
        </div>
        <div class="pending-field">
          <label>Era</label>
          <select onchange="editPending('${esc(id)}','era',this.value)">${eraOptions}</select>
        </div>
        <div class="pending-field">
          <label>Photographer</label>
          <input class="short" value="${esc(photog)}"
                 onchange="editPending('${esc(id)}','photographer',this.value)">
        </div>
        <div class="pending-field">
          <label>Location</label>
          <input class="med" value="${esc(location)}"
                 onchange="editPending('${esc(id)}','location',this.value)">
        </div>
        <div class="pending-field">
          <label>Center</label>
          <input class="short" style="width:80px;text-transform:uppercase" value="${esc(center)}"
                 onchange="editPending('${esc(id)}','center',this.value.toUpperCase())">
        </div>
      </div>
      ${c.description ? `<div class="pending-desc" onclick="this.classList.toggle('expanded')">${highlightField(c.description, evidence, 'description')}</div>` : ''}
      <div class="pending-actions">
        <button class="promote" onclick="promoteOne('${esc(id)}')">Promote</button>
        <button class="reject"  onclick="rejectOne('${esc(id)}')">Reject</button>
        <button class="view"    onclick="window.open('${esc(c.source_url || c.image_url || '#')}','_blank')">View source ↗</button>
      </div>
    </div>
  </div>`;
}

// Render "Matched in title:" as small colored chips. Title is editable so
// we can't use inline <mark>, but we can still surface the matches here.
function renderTitleMatches(evidence) {
  const matches = uniqueMatchesForField(evidence, 'title');
  if (matches.length === 0) return '';
  const chips = matches
      .map(m => `<mark class="era-${esc(m.era)}" title="${esc('matched pattern: ' + (m.pattern || m.excerpt) + '  ·  era: ' + m.era)}">${esc(m.excerpt)}</mark>`)
      .join(' ');
  return `<div class="pending-title-matches"><strong>Matched in title:</strong> ${chips}</div>`;
}

// Render quality-score failures below the badges so the reviewer sees
// why a card is yellow/red without hovering.
function renderQualityFailures(evidence) {
  const fails = (evidence && evidence.quality_failures) || [];
  if (fails.length === 0) return '';
  const lines = fails.map(f => `${esc(f.field)}: ${esc(f.reason)}`).join(' · ');
  return `<div class="pending-quality-detail"><strong>Quality:</strong> ${lines}</div>`;
}

function buildConfidenceTooltip(cls, evidence) {
  const reason = cls.reason || 'no reason recorded';
  const matches = ((evidence && evidence.era_matches) || []).filter(m => m.kind === 'keyword');
  const counts = {};
  for (const m of matches) counts[m.era] = (counts[m.era] || 0) + 1;
  const breakdown = Object.entries(counts).map(([e, n]) => `${n}× ${e}`).join(', ');
  return breakdown ? `${reason}  ·  keywords: ${breakdown}` : reason;
}

function buildQualityTooltip(evidence) {
  const fails = (evidence && evidence.quality_failures) || [];
  if (fails.length === 0) return 'all editorial must-haves present';
  return fails.map(f => `${f.field}: ${f.reason}`).join('\n');
}

window.togglePendingSelect = function(checkbox, id) {
  if (checkbox.checked) pendingSelected.add(id);
  else pendingSelected.delete(id);
  updatePendingCount();
};

window.editPending = function(id, field, value) {
  const cur = pendingEdits.get(id) || {};
  cur[field] = value;
  pendingEdits.set(id, cur);
};

async function rejectOne(id) {
  if (!confirm(`Reject candidate "${id}"? It will not reappear on future syncs.`)) return;
  try {
    await sidecarFetch('/reject', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source_ids: [id] }),
    });
    pendingSelected.delete(id);
    pendingEdits.delete(id);
    await loadPending();
  } catch (err) {
    alert('Reject failed: ' + err.message);
  }
}

async function rejectSelected() {
  if (pendingSelected.size === 0) { alert('No candidates selected.'); return; }
  if (!confirm(`Reject ${pendingSelected.size} candidate(s)? They will not reappear.`)) return;
  const ids = Array.from(pendingSelected);
  try {
    await sidecarFetch('/reject', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source_ids: ids }),
    });
    for (const id of ids) { pendingSelected.delete(id); pendingEdits.delete(id); }
    await loadPending();
  } catch (err) {
    alert('Reject failed: ' + err.message);
  }
}

async function promoteOne(id) {
  const edits = pendingEdits.get(id) || {};
  if (!confirm(`Promote candidate "${id}" to photos.js? Image will be downloaded to web/.`)) return;
  await doPromote([{ source_id: id, edits }]);
}

async function promoteSelected() {
  if (pendingSelected.size === 0) { alert('No candidates selected.'); return; }
  const items = Array.from(pendingSelected).map(id => ({
    source_id: id,
    edits: pendingEdits.get(id) || {},
  }));
  if (!confirm(`Promote ${items.length} candidate(s) to photos.js? Each image will be downloaded to web/.`)) return;
  await doPromote(items);
}

async function doPromote(items) {
  const btnPromote = document.getElementById('pending-promote-btn');
  const orig = btnPromote.textContent;
  btnPromote.disabled = true;
  btnPromote.textContent = 'Downloading…';
  try {
    const result = await sidecarFetch('/promote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items, curator: 'johnmknight' }),
    });
    // The sidecar mutated photos.js on disk. Reload the page so the in-memory
    // PHOTO_DATA picks up the new entries — admin.html currently doesn't
    // hot-reload data and the simplest correctness story is a fresh load.
    alert(`Promoted ${result.promoted} candidate(s). Reloading admin to refresh PHOTO_DATA.`);
    window.location.reload();
  } catch (err) {
    alert('Promote failed: ' + err.message);
    btnPromote.disabled = false;
    btnPromote.textContent = orig;
  }
}

async function runSync() {
  const query   = document.getElementById('pending-query').value.trim();
  const centers = document.getElementById('pending-centers').value.trim();
  const limit   = parseInt(document.getElementById('pending-limit').value, 10) || 20;
  const body = { limit };
  if (query)   body.query = query;
  if (centers) body.centers = centers.split(/[,\s]+/).filter(Boolean);

  const btn = document.getElementById('pending-run-btn');
  const orig = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Running sync…';
  try {
    const result = await sidecarFetch('/sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!result.ok) {
      alert('Sync failed (exit ' + result.exitCode + '):\n\n' + (result.stderr || result.stdout));
    }
    await loadPending();
  } catch (err) {
    alert('Sync failed: ' + err.message);
  }
  btn.disabled = false;
  btn.textContent = orig;
}
</script>
